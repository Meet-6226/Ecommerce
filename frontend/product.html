<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | LUMIÈRE</title>
    <link href="./css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-white text-gray-900 antialiased flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="text-2xl font-bold tracking-widest text-dark uppercase">Lumière</a>
                <div class="flex items-center space-x-6">
                    <a href="cart.html" class="text-gray-600 hover:text-blue-600 relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full" id="product-container">
        <!-- Loader -->
        <div class="animate-pulse flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-1/2 h-[500px] bg-gray-200 rounded-2xl"></div>
            <div class="w-full md:w-1/2 space-y-4 py-8">
                <div class="h-8 bg-gray-200 rounded w-3/4"></div>
                <div class="h-6 bg-gray-200 rounded w-1/4"></div>
                <div class="h-32 bg-gray-200 rounded w-full"></div>
            </div>
        </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <script src="./js/api.js"></script>
    <script src="./js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById('product-container');

            if (!productId) {
                container.innerHTML = '<div class="text-center py-20"><h2 class="text-2xl font-bold">Product not found</h2><a href="products.html" class="text-blue-600 hover:underline mt-4 inline-block">Return to shop</a></div>';
                return;
            }

            const product = await api.getProductById(productId);

            if (!product) {
                container.innerHTML = '<div class="text-center py-20"><h2 class="text-2xl font-bold">Product not found</h2><a href="products.html" class="text-blue-600 hover:underline mt-4 inline-block">Return to shop</a></div>';
                return;
            }

            // To use in onclick
            window.currentProduct = product;

            container.innerHTML = `
                <div class="lg:grid lg:grid-cols-2 lg:gap-x-12 xl:gap-x-16">
                    <div class="lg:max-w-lg lg:self-end">
                        <div class="mt-4 mb-4">
                            <nav aria-label="Breadcrumb">
                                <ol role="list" class="flex items-center space-x-2">
                                    <li><a href="products.html" class="text-sm font-medium text-gray-500 hover:text-gray-900">Shop</a></li>
                                    <li><svg class="h-5 w-5 text-gray-300" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true"><path d="M5.555 17.776l8-16 .894.448-8 16-.894-.448z" /></svg></li>
                                    <li><a href="products.html?category=${product.category}" class="text-sm font-medium text-gray-500 hover:text-gray-900">${product.category}</a></li>
                                </ol>
                            </nav>
                        </div>
                        
                        <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 sm:text-4xl">${product.name}</h1>
                        <section aria-labelledby="information-heading" class="mt-4">
                            <h2 id="information-heading" class="sr-only">Product information</h2>
                            <div class="flex items-center">
                                <p class="text-2xl text-gray-900 font-semibold">${formatPrice(product.price)}</p>
                            </div>

                            <div class="mt-6 space-y-6">
                                <p class="text-base text-gray-500">${product.description}</p>
                            </div>
                            
                            <div class="mt-6 flex items-center">
                                <span class="text-sm text-gray-500">Stock Status: <span class="${product.stock > 0 ? 'text-green-600' : 'text-red-600'} font-medium">${product.stock > 0 ? 'In Stock' : 'Out of Stock'}</span></span>
                            </div>
                        </section>
                    </div>

                    <div class="mt-10 lg:mt-0 lg:col-start-2 lg:row-span-2 lg:self-center">
                        <div class="aspect-w-1 aspect-h-1 rounded-2xl overflow-hidden shadow-2xl">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover object-center shadow-lg hover:scale-105 transition-transform duration-700">
                        </div>
                    </div>

                    <div class="mt-10 lg:max-w-lg lg:col-start-1 lg:row-start-2 lg:self-start">
                        <section aria-labelledby="options-heading">
                            <div class="mt-10 flex flex-col gap-4">
                                <button onclick="addToCart(window.currentProduct)" ${product.stock <= 0 ? 'disabled' : ''} class="w-full bg-blue-600 border border-transparent rounded-md py-4 px-8 flex items-center justify-center text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-50 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors shadow-lg">
                                    ${product.stock > 0 ? 'Add to bag' : 'Out of Stock'}
                                </button>
                                <div class="text-center text-sm text-gray-500 mt-4 flex items-center justify-center">
                                    <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                    Secure Checkout
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
