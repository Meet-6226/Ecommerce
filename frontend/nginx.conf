# Upstream Load Balancing Configuration
upstream backend_api {
    # The internal DNS name resolves to the backend service in docker-compose
    server fashion_backend:5000;
    
    # Future scaling support: add more replicas here
    # server fashion_backend_2:5000;
    # server fashion_backend_3:5000;
}

server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Root directory for frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------
    # API Reverse Proxy
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Static Assets Caching
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Default routing for traditional multi-page apps
    location / {
        try_files $uri $uri/ =404;
    }
}
